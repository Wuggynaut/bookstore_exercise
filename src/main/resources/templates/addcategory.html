<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Category</title>
</head>

<body>
    <h1>Add Category</h1>
    <form method="post" action="#" th:action="@{/savecategory}" th:object="${category}">
        <p>Category: <input type="text" th:field="*{name}" /></p>
        <p><input type="submit" value="Submit category" /></p>
    </form>
</body>

</html>
